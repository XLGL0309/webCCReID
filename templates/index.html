<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>换衣行人重识别系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-weight: bold;
            color: #555;
        }
        input[type="file"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>换衣行人重识别系统</h1>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="probe">上传探针图（目标行人照片）</label>
                <input type="file" id="probe" name="probe" accept=".png,.jpg,.jpeg" required>
            </div>
            <div class="form-group">
                <label for="gallery">上传底库文件夹（多张备选图）</label>
                <input type="file" id="gallery" name="gallery" accept=".png,.jpg,.jpeg" multiple required>
            </div>
            <div class="form-group">
                <label for="model">选择模型</label>
                <select id="model" name="model" required>
                    {% for model in models %}
                    <option value="{{ model.path }}">{{ model.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit">开始检索</button>
        </form>
    </div>
</body>
</html>
