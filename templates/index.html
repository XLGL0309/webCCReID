<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>换衣行人重识别系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #333;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            color: #666;
            font-size: 1.1rem;
            font-weight: 400;
        }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: 600;
            color: #333;
            font-size: 1rem;
        }
        
        .file-upload {
            position: relative;
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }
        
        .file-upload:hover {
            border-color: #667eea;
            background-color: #f0f0ff;
        }
        
        .file-upload input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        .file-upload .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .file-upload .icon {
            font-size: 2.5rem;
            color: #667eea;
        }
        
        .file-upload .text {
            color: #666;
            font-size: 0.9rem;
        }
        
        select {
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            background-color: #fff;
            transition: all 0.3s ease;
        }
        
        select:hover {
            border-color: #667eea;
        }
        
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .submit-btn {
            padding: 15px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }
        
        .submit-btn:hover::before {
            left: 100%;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .file-upload {
                padding: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .header p {
                font-size: 0.9rem;
            }
        }
        
        .selected-files {
            margin-top: 15px;
        }
        
        .file-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .file-item {
            background-color: #f0f0ff;
            border: 1px solid #667eea;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .file-item .file-name {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .file-item .remove-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }
        
        .file-item .remove-btn:hover {
            background-color: rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>换衣行人重识别系统</h1>
            <p>智能识别不同着装下的同一行人</p>
        </div>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="probe">上传探针图（目标行人照片）</label>
                <div class="file-upload">
                    <input type="file" id="probe" name="probe" accept=".png,.jpg,.jpeg" required>
                    <div class="placeholder">
                        <div class="icon">📷</div>
                        <div class="text">点击或拖拽文件到此处上传</div>
                        <div class="text" style="font-size: 0.8rem; color: #999;">支持 PNG, JPG, JPEG 格式</div>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="gallery">上传底库文件夹（多张备选图）</label>
                <div class="file-upload">
                    <input type="file" id="gallery" name="gallery" accept=".png,.jpg,.jpeg,.mp4,.avi,.mov,.wmv" multiple required>
                    <div class="placeholder">
                        <div class="icon">📁</div>
                        <div class="text">点击或拖拽文件到此处上传</div>
                        <div class="text" style="font-size: 0.8rem; color: #999;">可选择多张图片或视频，支持从多个文件夹中选择</div>
                    </div>
                </div>
                <div id="selected-files" class="selected-files">
                    <div class="file-list"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="model">选择模型</label>
                <select id="model" name="model" required>
                    {% for model in models %}
                    <option value="{{ model.path }}">{{ model.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="submit-btn">开始检索 🔍</button>
        </form>
    </div>
    <script>
        // 存储已选择的底库文件
        let selectedFiles = [];
        
        // 为文件上传添加拖拽功能
        document.querySelectorAll('.file-upload').forEach(upload => {
            const input = upload.querySelector('input[type="file"]');
            const placeholder = upload.querySelector('.placeholder');
            
            upload.addEventListener('dragover', (e) => {
                e.preventDefault();
                upload.style.borderColor = '#667eea';
                upload.style.backgroundColor = '#f0f0ff';
            });
            
            upload.addEventListener('dragleave', () => {
                upload.style.borderColor = '#ddd';
                upload.style.backgroundColor = '#f9f9f9';
            });
            
            upload.addEventListener('drop', (e) => {
                e.preventDefault();
                upload.style.borderColor = '#ddd';
                upload.style.backgroundColor = '#f9f9f9';
                
                if (e.dataTransfer.files.length > 0) {
                    handleFiles(e.dataTransfer.files, input, placeholder);
                }
            });
            
            input.addEventListener('change', () => {
                if (input.files.length > 0) {
                    handleFiles(input.files, input, placeholder);
                }
            });
        });
        
        function handleFiles(files, input, placeholder) {
            // 检查是否是底库文件上传
            if (input.id === 'gallery') {
                // 追加文件到已选择列表
                for (let i = 0; i < files.length; i++) {
                    selectedFiles.push(files[i]);
                }
                
                // 更新显示
                updateFileList();
                placeholder.querySelector('.text').textContent = `已选择 ${selectedFiles.length} 个文件`;
                
                // 创建一个新的FileList对象，包含所有已选择的文件
                const dataTransfer = new DataTransfer();
                selectedFiles.forEach(file => {
                    dataTransfer.items.add(file);
                });
                input.files = dataTransfer.files;
            } else {
                // 探针图上传，保持原有逻辑
                if (files.length > 0) {
                    placeholder.querySelector('.text').textContent = files[0].name;
                }
            }
        }
        
        function updateFileList() {
            const fileList = document.querySelector('.file-list');
            fileList.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span class="file-name">${file.name}</span>
                    <button type="button" class="remove-btn" onclick="removeFile(${index})">×</button>
                `;
                fileList.appendChild(fileItem);
            });
        }
        
        function removeFile(index) {
            // 从数组中删除文件
            selectedFiles.splice(index, 1);
            
            // 更新显示
            updateFileList();
            
            // 更新input的files属性
            const input = document.getElementById('gallery');
            const placeholder = input.parentElement.querySelector('.placeholder');
            
            const dataTransfer = new DataTransfer();
            selectedFiles.forEach(file => {
                dataTransfer.items.add(file);
            });
            input.files = dataTransfer.files;
            
            // 更新占位符文本
            if (selectedFiles.length > 0) {
                placeholder.querySelector('.text').textContent = `已选择 ${selectedFiles.length} 个文件`;
            } else {
                placeholder.querySelector('.text').textContent = '点击或拖拽文件到此处上传';
            }
        }
    </script>
</body>
</html>
